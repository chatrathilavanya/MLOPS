apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: default
data:
  provider.yml: |-
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: default
data:
  dashboard.json: |-
    {
      "title": "Heart Disease API Monitoring",
      "panels": [
        {
          "type": "timeseries",
          "title": "Request Rate",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"heart-disease-api\"}[1m]))",
              "legendFormat": "Requests / sec"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Requests",
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"heart-disease-api\"})"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "API Memory Usage (MB)",
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=\"heart-disease-api\"} / 1024 / 1024"
            }
          ]
        }
      ]
    }
