global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'heart-disease-api'

scrape_configs:
  - job_name: 'heart-disease-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
